name: Build all plugins + publish

# Top-level orchestrator. Fans out to build-plugin.yml once per plugin, then
# aggregates every installer into ONE GitHub Release (durable binary host, no
# Pages size limits) and publishes a GitHub Pages download site + catalog.json
# that links to those release assets.
#
# Adding a plugin = add a plugins/<name>.toml manifest AND one ~6-line call job
# below. Per-plugin config secrets must be mapped explicitly here because a
# reusable workflow cannot select a secret by a dynamic name.

on:
  workflow_dispatch:
    inputs:
      release_tag:
        description: tag for the aggregate release (e.g. installers-2026-07-06)
        required: true
        type: string
      level:
        description: "quality level for every plugin: build | validate | full"
        required: false
        type: choice
        options: [build, validate, full]
        default: validate
  # Weekly refresh of the download site against each plugin's default branch —
  # scheduled runs use the full quality suite (sanitizers, coverage,
  # benchmarks, manuals) on top of validate's lint + pluginval + clapval.
  schedule:
    - cron: "0 6 * * 1"

permissions:
  contents: write        # create the aggregate release
  pages: write           # deploy Pages
  id-token: write        # Pages OIDC

concurrency:
  group: build-all
  cancel-in-progress: false

jobs:
  # ---- one call job per plugin (maps that plugin's config secret) -----------
  polygraph:
    uses: ./.github/workflows/build-plugin.yml
    with:
      plugin: polygraph
      level: ${{ github.event_name == 'schedule' && 'full' || inputs.level || 'validate' }}
    secrets:
      PAT: ${{ secrets.PAT }}
      PLUGIN_CONFIG_B64: ${{ secrets.POLYGRAPH_CONFIG_B64 }}
      MACOS_INSTALLER_SIGN_IDENTITY: ${{ secrets.MACOS_INSTALLER_SIGN_IDENTITY }}

  churn:
    uses: ./.github/workflows/build-plugin.yml
    with:
      plugin: churn
      level: ${{ github.event_name == 'schedule' && 'full' || inputs.level || 'validate' }}
    secrets:
      PAT: ${{ secrets.PAT }}
      PLUGIN_CONFIG_B64: ${{ secrets.CHURN_CONFIG_B64 }}
      MACOS_INSTALLER_SIGN_IDENTITY: ${{ secrets.MACOS_INSTALLER_SIGN_IDENTITY }}

  chasm:
    uses: ./.github/workflows/build-plugin.yml
    with:
      plugin: chasm
      level: ${{ github.event_name == 'schedule' && 'full' || inputs.level || 'validate' }}
    secrets:
      PAT: ${{ secrets.PAT }}
      PLUGIN_CONFIG_B64: ${{ secrets.CHASM_CONFIG_B64 }}
      MACOS_INSTALLER_SIGN_IDENTITY: ${{ secrets.MACOS_INSTALLER_SIGN_IDENTITY }}

  spicerack:
    uses: ./.github/workflows/build-plugin.yml
    with:
      plugin: spicerack
      level: ${{ github.event_name == 'schedule' && 'full' || inputs.level || 'validate' }}
    secrets:
      PAT: ${{ secrets.PAT }}
      PLUGIN_CONFIG_B64: ${{ secrets.SPICERACK_CONFIG_B64 }}
      MACOS_INSTALLER_SIGN_IDENTITY: ${{ secrets.MACOS_INSTALLER_SIGN_IDENTITY }}

  # 2026 spectral lineup (Moonbase-licensed).
  cleave:
    uses: ./.github/workflows/build-plugin.yml
    with:
      plugin: cleave
      level: ${{ github.event_name == 'schedule' && 'full' || inputs.level || 'validate' }}
    secrets:
      PAT: ${{ secrets.PAT }}
      PLUGIN_CONFIG_B64: ${{ secrets.CLEAVE_CONFIG_B64 }}
      MACOS_INSTALLER_SIGN_IDENTITY: ${{ secrets.MACOS_INSTALLER_SIGN_IDENTITY }}

  sift:
    uses: ./.github/workflows/build-plugin.yml
    with:
      plugin: sift
      level: ${{ github.event_name == 'schedule' && 'full' || inputs.level || 'validate' }}
    secrets:
      PAT: ${{ secrets.PAT }}
      PLUGIN_CONFIG_B64: ${{ secrets.SIFT_CONFIG_B64 }}
      MACOS_INSTALLER_SIGN_IDENTITY: ${{ secrets.MACOS_INSTALLER_SIGN_IDENTITY }}

  umbra:
    uses: ./.github/workflows/build-plugin.yml
    with:
      plugin: umbra
      level: ${{ github.event_name == 'schedule' && 'full' || inputs.level || 'validate' }}
    secrets:
      PAT: ${{ secrets.PAT }}
      PLUGIN_CONFIG_B64: ${{ secrets.UMBRA_CONFIG_B64 }}
      MACOS_INSTALLER_SIGN_IDENTITY: ${{ secrets.MACOS_INSTALLER_SIGN_IDENTITY }}

  drift:
    uses: ./.github/workflows/build-plugin.yml
    with:
      plugin: drift
      level: ${{ github.event_name == 'schedule' && 'full' || inputs.level || 'validate' }}
    secrets:
      PAT: ${{ secrets.PAT }}
      PLUGIN_CONFIG_B64: ${{ secrets.DRIFT_CONFIG_B64 }}
      MACOS_INSTALLER_SIGN_IDENTITY: ${{ secrets.MACOS_INSTALLER_SIGN_IDENTITY }}

  echolith:
    uses: ./.github/workflows/build-plugin.yml
    with:
      plugin: echolith
      level: ${{ github.event_name == 'schedule' && 'full' || inputs.level || 'validate' }}
    secrets:
      PAT: ${{ secrets.PAT }}
      PLUGIN_CONFIG_B64: ${{ secrets.ECHOLITH_CONFIG_B64 }}
      MACOS_INSTALLER_SIGN_IDENTITY: ${{ secrets.MACOS_INSTALLER_SIGN_IDENTITY }}

  # Free / no-Moonbase plugins — no PLUGIN_CONFIG_B64 secret to pass.
  fuzzboy:
    uses: ./.github/workflows/build-plugin.yml
    with:
      plugin: fuzzboy
      level: ${{ github.event_name == 'schedule' && 'full' || inputs.level || 'validate' }}
    secrets:
      PAT: ${{ secrets.PAT }}
      MACOS_INSTALLER_SIGN_IDENTITY: ${{ secrets.MACOS_INSTALLER_SIGN_IDENTITY }}

  hot-potato:
    uses: ./.github/workflows/build-plugin.yml
    with:
      plugin: hot-potato
      level: ${{ github.event_name == 'schedule' && 'full' || inputs.level || 'validate' }}
    secrets:
      PAT: ${{ secrets.PAT }}
      MACOS_INSTALLER_SIGN_IDENTITY: ${{ secrets.MACOS_INSTALLER_SIGN_IDENTITY }}

  makeitloud:
    uses: ./.github/workflows/build-plugin.yml
    with:
      plugin: makeitloud
      level: ${{ github.event_name == 'schedule' && 'full' || inputs.level || 'validate' }}
    secrets:
      PAT: ${{ secrets.PAT }}
      MACOS_INSTALLER_SIGN_IDENTITY: ${{ secrets.MACOS_INSTALLER_SIGN_IDENTITY }}

  # ---- aggregate: release binaries, build catalog + site, deploy Pages ------
  publish:
    needs: [polygraph, churn, chasm, spicerack, cleave, sift, umbra, drift, echolith, fuzzboy, hot-potato, makeitloud]
    # Publish whatever succeeded; a single failing plugin should not sink the
    # rest of the catalog.
    if: ${{ always() }}
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - name: Download all installer artifacts
        uses: actions/download-artifact@v4
        with:
          path: _incoming
          # ONLY the installer artifacts (<slug>-{windows,macos,linux}). A bare
          # "*-*" also pulls every <slug>-raw-* bundle and val log — 140
          # artifacts incl. two ~540 MB chasm blobs — and the big raw downloads
          # flaked out three runs in a row ("failed after 5 retries"), sinking
          # publish. Keep this brace list in sync when adding a plugin (same
          # place you add the call job above).
          pattern: "{polygraph,churn,chasm,spicerack,cleave,sift,umbra,drift,echolith,fuzzboy,hot-potato,makeitloud}-{windows,macos,linux}"
          merge-multiple: true

      - name: Stage installers into one flat dist/
        id: stage
        run: |
          mkdir -p dist
          # All three platform installers already carry the real version in their
          # filename (<Company>-<Product>-<Version>-<OS>.<ext>), so a flat copy is
          # all the catalog builder needs.
          find _incoming -type f \( \
            -name "*-Windows.exe*" -o -name "*-macOS.pkg*" \
            -o -name "*-Linux.zip" -o -name "*-Linux.zip.sha256" \
          \) -exec cp {} dist/ \;
          ls -la dist || true
          COUNT=$(find dist -type f | wc -l)
          echo "count=$COUNT" >> "$GITHUB_OUTPUT"

      - name: Resolve release tag
        id: tag
        run: |
          TAG="${{ inputs.release_tag }}"
          [ -z "$TAG" ] && TAG="installers-nightly"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"

      - name: Create / update aggregate GitHub Release (binary host)
        if: steps.stage.outputs.count != '0'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          TAG="${{ steps.tag.outputs.tag }}"
          if gh release view "$TAG" >/dev/null 2>&1; then
            gh release upload "$TAG" dist/* --clobber
          else
            gh release create "$TAG" dist/* \
              --title "DirektDSP Installers ($TAG)" \
              --notes "Unified installers for all DirektDSP plugins. See the download site + catalog.json for checksums and the machine-readable index."
          fi

      - name: Build catalog.json
        run: |
          BASE="https://github.com/${{ github.repository }}/releases/download/${{ steps.tag.outputs.tag }}/{filename}"
          python3 tools/build_catalog.py \
            --artifacts-dir dist \
            --url-base "$BASE" \
            --out site/catalog.json \
            --generated-at "$(date -u +%Y-%m-%dT%H:%M:%SZ)"

      - name: Validate catalog against schema
        run: python3 tools/validate_catalog.py --catalog site/catalog.json --schema schema/catalog.schema.json

      - name: Generate download site
        run: python3 tools/gen_site.py --catalog site/catalog.json --out site

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: site

      - name: Deploy to GitHub Pages
        id: deploy
        uses: actions/deploy-pages@v4

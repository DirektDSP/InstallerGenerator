# InstallerGenerator manifest for Sift — written by scripts/new_plugin.py to
# InstallerGenerator/plugins/sift.toml. That copy is the single source
# of truth for installer copy text (description/tagline) and the catalog; keep
# it in sync on every release-affecting change (see /release-plugin).
schema_version = "1"

[repo]
name = "Sift"
ref  = ""

[identity]
product_name = "Sift"
company_name = "DirektDSP"
bundle_id    = "com.direktdsp.sift"
description  = "Noise-profile denoise — learn the noise, subtract the noise, keep the voice"
tagline      = "Keep the signal. Lose the noise."
trial_days   = 14
website      = "https://direktdsp.com"

[formats]
windows = ["VST3", "CLAP", "Standalone"]
macos   = ["VST3", "AU", "CLAP", "Standalone"]
linux   = ["VST3", "CLAP", "Standalone"]

[build]
system                = "cmake"
build_dir             = "build"
artefacts_subdir      = "Sift_artefacts"
needs_plugin_template = true
disable_moonbase_flag = "SIFT_DISABLE_MOONBASE"
config_secret         = "SIFT_CONFIG_B64"

[build.targets]
VST3       = "Sift_VST3"
CLAP       = "Sift_CLAP"
AU         = "Sift_AU"
Standalone = "Sift_Standalone"

[assets]
icon_ico    = "packaging/icon.ico"
icon_png    = "packaging/icon.png"
header_bmp  = "packaging/header.bmp"
welcome_bmp = "packaging/welcome.bmp"

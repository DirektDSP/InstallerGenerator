# InstallerGenerator manifest for Umbra — written by scripts/new_plugin.py to
# InstallerGenerator/plugins/umbra.toml. That copy is the single source
# of truth for installer copy text (description/tagline) and the catalog; keep
# it in sync on every release-affecting change (see /release-plugin).
schema_version = "1"

[repo]
name = "Umbra"
ref  = ""

[identity]
product_name = "Umbra"
company_name = "DirektDSP"
bundle_id    = "com.direktdsp.umbra"
description  = "Sidechain-aware spectral ducker — dips only the frequencies that collide, only while they collide"
tagline      = "Make room. Automatically."
trial_days   = 14
website      = "https://direktdsp.com"

[formats]
windows = ["VST3", "CLAP", "Standalone"]
macos   = ["VST3", "AU", "CLAP", "Standalone"]
linux   = ["VST3", "CLAP", "Standalone"]

[build]
system                = "cmake"
build_dir             = "build"
artefacts_subdir      = "Umbra_artefacts"
needs_plugin_template = true
disable_moonbase_flag = "UMBRA_DISABLE_MOONBASE"
config_secret         = "UMBRA_CONFIG_B64"

[build.targets]
VST3       = "Umbra_VST3"
CLAP       = "Umbra_CLAP"
AU         = "Umbra_AU"
Standalone = "Umbra_Standalone"

[assets]
icon_ico    = "packaging/icon.ico"
icon_png    = "packaging/icon.png"
header_bmp  = "packaging/header.bmp"
welcome_bmp = "packaging/welcome.bmp"

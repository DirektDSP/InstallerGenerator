# InstallerGenerator manifest for ChasmPro — written by scripts/new_plugin.py to
# InstallerGenerator/plugins/chasmpro.toml. That copy is the single source
# of truth for installer copy text (description/tagline) and the catalog; keep
# it in sync on every release-affecting change (see /release-plugin).
schema_version = "1"

[repo]
name = "ChasmPro"
ref  = ""

[identity]
product_name = "Chasm Pro"
company_name = "DirektDSP"
bundle_id    = "com.direktdsp.chasmpro"
description  = "Diffusion and depth processor — Schroeder allpass smear, stereo tools, tone shaping and integrated saturation"
tagline      = "Depth you can drown in"
trial_days   = 14
website      = "https://direktdsp.com"

[formats]
windows = ["VST3", "CLAP", "Standalone"]
macos   = ["VST3", "AU", "CLAP", "Standalone"]
linux   = ["VST3", "CLAP", "Standalone"]

[build]
system                = "cmake"
build_dir             = "build"
artefacts_subdir      = "ChasmPro_artefacts"
needs_plugin_template = true
disable_moonbase_flag = "CHASMPRO_DISABLE_MOONBASE"
config_secret         = "CHASMPRO_CONFIG_B64"

[build.targets]
VST3       = "ChasmPro_VST3"
CLAP       = "ChasmPro_CLAP"
AU         = "ChasmPro_AU"
Standalone = "ChasmPro_Standalone"

[assets]
icon_ico    = "packaging/icon.ico"
icon_png    = "packaging/icon.png"
header_bmp  = "packaging/header.bmp"
welcome_bmp = "packaging/welcome.bmp"

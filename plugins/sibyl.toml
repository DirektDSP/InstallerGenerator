# InstallerGenerator manifest for Sibyl — written by scripts/new_plugin.py to
# InstallerGenerator/plugins/sibyl.toml. That copy is the single source
# of truth for installer copy text (description/tagline) and the catalog; keep
# it in sync on every release-affecting change (see /release-plugin).
schema_version = "1"

[repo]
name = "Sibyl"
ref  = ""

[identity]
product_name = "Sibyl"
company_name = "DirektDSP"
bundle_id    = "com.direktdsp.sibyl"
description  = "LPC voice resynthesis — from Speak & Spell to spectral oracle"
tagline      = "speak in tongues"
trial_days   = 14
website      = "https://direktdsp.com"

[formats]
windows = ["VST3", "CLAP", "Standalone"]
macos   = ["VST3", "AU", "CLAP", "Standalone"]
linux   = ["VST3", "CLAP", "Standalone"]

[build]
system                = "cmake"
build_dir             = "build"
artefacts_subdir      = "Sibyl_artefacts"
needs_plugin_template = true
disable_moonbase_flag = "SIBYL_DISABLE_MOONBASE"
config_secret         = "SIBYL_CONFIG_B64"

[build.targets]
VST3       = "Sibyl_VST3"
CLAP       = "Sibyl_CLAP"
AU         = "Sibyl_AU"
Standalone = "Sibyl_Standalone"

[assets]
icon_ico    = "packaging/icon.ico"
icon_png    = "packaging/icon.png"
header_bmp  = "packaging/header.bmp"
welcome_bmp = "packaging/welcome.bmp"
